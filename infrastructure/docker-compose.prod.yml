name: kanban-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Порт НЕ открываем наружу — только внутри Docker сети
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: kanban-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сервисы приложений будут добавляться здесь по мере разработки:
  #
  # auth-service:
  #   build: ../apps/auth-service
  #   restart: always
  #   ...
  #
  # task-service:
  #   build: ../apps/task-service
  #   ...

networks:
  default:
    name: kanban-network

volumes:
  postgres_data:
  redis_data:
